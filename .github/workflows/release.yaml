name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          binary_name="protoc-gen-openapi"
          if [ "$GOOS" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          go build -o "${binary_name}" -ldflags="-s -w" .

          # Create archive
          archive_name="protoc-gen-openapi-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "${archive_name}.zip" "${binary_name}"
          else
            tar -czvf "${archive_name}.tar.gz" "${binary_name}"
          fi

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          archive_name="protoc-gen-openapi-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release upload ${{ github.event.release.tag_name }} "${archive_name}.zip" --clobber
          else
            gh release upload ${{ github.event.release.tag_name }} "${archive_name}.tar.gz" --clobber
          fi
