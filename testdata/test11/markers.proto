syntax = "proto3";

package test11;

// Severity level for a log entry.
//
// +kubebuilder:example="warn"
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_DEBUG = 1;
  SEVERITY_INFO = 2;
  SEVERITY_WARN = 3;
  SEVERITY_ERROR = 4;
}

// A log entry referencing the Severity enum.
message LogEntry {
  // +kubebuilder:example="req-abc123"
  string id = 1;

  Severity severity = 2;
}
